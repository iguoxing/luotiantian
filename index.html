<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗罗作品集 · 2022-2024</title>
    <meta name="description" content="罗罗作品集——关于职场、管理、成长与生活的思考，2022-2024年合集">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 阅读进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 移动端顶部导航 -->
    <header class="mobile-header" id="mobileHeader">
        <button class="menu-toggle" id="menuToggle" aria-label="菜单">
            <span></span><span></span><span></span>
        </button>
        <span class="mobile-title">罗罗作品集</span>
        <span class="mobile-year" id="mobileYearBadge">2022-2024</span>
    </header>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <!-- 应用容器 -->
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="author-avatar">罗</div>
                <h1 class="author-name">罗罗</h1>
                <p class="author-bio">用文字记录关于职场、管理、成长与生活的思考。</p>
                <span class="collection-title">作品集</span>
                <span class="year-range">2022 — 2024</span>
            </div>

            <!-- 年份过滤器 -->
            <div class="year-filters" id="yearFilters">
                <button class="year-btn active" data-year="all">全部</button>
                <button class="year-btn" data-year="2024">2024</button>
                <button class="year-btn" data-year="2023">2023</button>
                <button class="year-btn" data-year="2022">2022</button>
            </div>

            <!-- 导航列表 -->
            <nav class="sidebar-nav" id="sidebarNav">
                <ul class="nav-list" id="navList"></ul>
            </nav>

            <!-- 底部统计 -->
            <div class="sidebar-footer">
                <div class="visit-counter">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span>访问 <strong id="visitCount">0</strong> 次</span>
                </div>
                <p class="copyright">© 2022-2024 罗罗</p>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 英雄区 -->
            <section class="hero" id="hero">
                <div class="hero-bg"></div>
                <div class="hero-content">
                    <h2 class="hero-title">罗罗作品集</h2>
                    <div class="hero-years">
                        <span class="hero-year">2022</span>
                        <span class="hero-year-divider">—</span>
                        <span class="hero-year">2023</span>
                        <span class="hero-year-divider">—</span>
                        <span class="hero-year accent">2024</span>
                    </div>
                    <p class="hero-desc" id="heroDesc">80 篇文章，15 万字思考</p>
                </div>
                <div class="hero-scroll">
                    <span>向下阅读</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
                    </svg>
                </div>
            </section>

            <!-- 文章列表 -->
            <div class="articles-container" id="articlesContainer"></div>

            <!-- 页脚 -->
            <footer class="main-footer">
                <div class="footer-divider"></div>
                <p>感谢阅读</p>
                <p class="footer-sub">罗罗作品集 · 2022-2024</p>
            </footer>
        </main>
    </div>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 15l-6-6-6 6"/>
        </svg>
    </button>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
