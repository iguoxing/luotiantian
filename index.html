<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗罗作品集（2022年）</title>
    <meta name="description" content="罗罗的2022年作品集 - 13篇关于职场、管理、成长与生活的思考">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 阅读进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 移动端顶部导航 -->
    <header class="mobile-header" id="mobileHeader">
        <button class="menu-toggle" id="menuToggle" aria-label="菜单">
            <span></span><span></span><span></span>
        </button>
        <span class="mobile-title">罗罗作品集</span>
        <span class="mobile-year">2022</span>
    </header>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <div class="app-container">
        <!-- PC端侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="author-avatar">罗</div>
                <h1 class="author-name">罗罗</h1>
                <p class="author-bio">一个感性大于理性、热爱学习与成长的物流人</p>
                <p class="collection-title">作品集 <span class="year-badge">2022</span></p>
                <div class="stats-brief">
                    <span>13 篇文章</span>
                    <span class="stat-divider">·</span>
                    <span>约 3.5 万字</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list" id="navList">
                    <!-- JS动态生成 -->
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="visit-counter">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span>访问 <strong id="visitCount">0</strong> 次</span>
                </div>
                <p class="copyright">© 2022 罗罗</p>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 英雄区域 -->
            <section class="hero" id="hero">
                <div class="hero-bg"></div>
                <div class="hero-content">
                    <h2 class="hero-title">罗罗作品集</h2>
                    <p class="hero-year">2022</p>
                    <p class="hero-desc">13篇关于职场、管理、成长与生活的思考</p>
                    <p class="hero-quote">"人生没有白走的路，每一步都算数。"</p>
                    <div class="hero-scroll">
                        <span>向下阅读</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12l7 7 7-7"/>
                        </svg>
                    </div>
                </div>
            </section>

            <!-- 文章列表 -->
            <div class="articles-container" id="articlesContainer">
                <!-- JS动态生成 -->
            </div>

            <!-- 页脚 -->
            <footer class="main-footer">
                <div class="footer-divider"></div>
                <p>2022年，罗罗完成了 561 小时的输入与 514 篇的输出</p>
                <p class="footer-sub">感谢阅读 · 感恩遇见</p>
            </footer>
        </main>
    </div>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
    </button>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
